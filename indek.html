<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · Umi Qoriah</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');

:root{
  --ivory:#f5f0e8;
  --warm:#e8c98a;
  --rose:#c9847a;
  --sage:#7a9e8a;
  --purple:#a78bfa;
  --ink:#0d0a1a;
  --coal:#110e22;
  --charcoal:#1a1630;
  --border:rgba(167,139,250,.14);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#0d0a1a;
  color:var(--ivory);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* ── CURSOR ── */
#c-dot{position:fixed;width:7px;height:7px;background:var(--warm);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(232,201,138,.9);}
#c-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(167,139,250,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}

/* ── BACKGROUND ── */
#bg-base{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 85% 65% at 10% 15%, rgba(120,50,200,.6) 0%, transparent 55%),
    radial-gradient(ellipse 75% 60% at 90% 80%, rgba(180,50,110,.5) 0%, transparent 55%),
    radial-gradient(ellipse 55% 55% at 50% 50%, rgba(40,25,100,.7) 0%, transparent 65%),
    radial-gradient(ellipse 80% 45% at 55% 100%, rgba(70,30,150,.45) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 5% 80%,  rgba(30,80,120,.35) 0%, transparent 55%),
    linear-gradient(135deg, #0a0715 0%, #160b2a 40%, #0e1025 70%, #180a1e 100%);
  animation:bgPulse 20s ease-in-out infinite alternate;
}
@keyframes bgPulse{
  0%  {filter:hue-rotate(0deg) brightness(1);}
  33% {filter:hue-rotate(12deg) brightness(1.05);}
  66% {filter:hue-rotate(-8deg) brightness(.98);}
  100%{filter:hue-rotate(5deg) brightness(1.03);}
}

#dot-tex{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
  background-size:26px 26px;
}

#hatch{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(
    -50deg, transparent, transparent 20px,
    rgba(167,139,250,.022) 20px, rgba(167,139,250,.022) 21px
  );
}

#nebula{position:fixed;inset:0;z-index:1;pointer-events:none;}
#streak{position:fixed;inset:0;z-index:2;pointer-events:none;}
#dust  {position:fixed;inset:0;z-index:2;pointer-events:none;}

/* ── CORNER ORNAMENTS ── */
.corner{position:fixed;width:190px;height:190px;pointer-events:none;z-index:3;opacity:.4;}
.corner-tl{top:0;left:0;}
.corner-tr{top:0;right:0;transform:scaleX(-1);}
.corner-bl{bottom:0;left:0;transform:scaleY(-1);}
.corner-br{bottom:0;right:0;transform:scale(-1);}

/* ── FLOATING GEO ── */
.geo{position:fixed;pointer-events:none;z-index:2;animation:geoRise linear infinite;opacity:0;}
@keyframes geoRise{
  0%  {opacity:0;transform:translateY(108vh) rotate(0deg);}
  7%  {opacity:1;}
  93% {opacity:.75;}
  100%{opacity:0;transform:translateY(-14vh) rotate(430deg);}
}

/* ── HERO ── */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4;padding:24px 20px;}

.watermark{
  position:absolute;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(55px,14vw,140px);font-weight:700;font-style:italic;
  color:rgba(167,139,250,.04);
  text-align:center;width:100%;
  top:50%;transform:translateY(-50%);
  pointer-events:none;user-select:none;
  letter-spacing:8px;line-height:.9;
}

.orbit-wrapper{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:clamp(280px,76vw,450px);height:clamp(280px,76vw,450px);z-index:2;
}
.deco-ring{position:absolute;border-radius:50%;}
.deco-ring:nth-child(1){inset:0;border:1px solid rgba(167,139,250,.18);animation:rs 28s linear infinite;}
.deco-ring:nth-child(2){inset:24px;border:1px solid rgba(201,132,122,.14);animation:rs 18s linear infinite reverse;}
.deco-ring:nth-child(3){inset:50px;border:1px solid rgba(122,158,138,.11);animation:rs 38s linear infinite;}
@keyframes rs{to{transform:rotate(360deg);}}

.av-wrap{position:relative;z-index:3;animation:lev 8s ease-in-out infinite;}
@keyframes lev{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}

.av-border{
  width:clamp(116px,29vw,185px);height:clamp(116px,29vw,185px);
  border-radius:50%;padding:2.5px;
  background:conic-gradient(var(--warm),var(--rose),var(--purple),var(--sage),var(--warm));
  animation:huerot 9s linear infinite;
}
@keyframes huerot{to{filter:hue-rotate(360deg);}}

.av-inner{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#2a1840,#0d0a1a);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(34px,8.5vw,60px);font-weight:700;font-style:italic;
  color:var(--warm);overflow:hidden;
}
.av-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

.av-glow{
  position:absolute;inset:-30px;border-radius:50%;
  background:radial-gradient(circle,rgba(167,139,250,.22),rgba(232,201,138,.1),transparent 65%);
  animation:gp 4s ease-in-out infinite;z-index:-1;
}
@keyframes gp{0%,100%{transform:scale(1);}50%{transform:scale(1.22);opacity:.65;}}

.ob{
  position:absolute;width:56px;height:56px;border-radius:50%;
  background:rgba(13,10,26,.85);
  border:1px solid rgba(167,139,250,.22);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:none;backdrop-filter:blur(16px);
  transition:border-color .3s,box-shadow .3s,background .3s;
  color:var(--warm);
}
.ob:hover{
  border-color:rgba(167,139,250,.75);
  background:rgba(167,139,250,.12);
  box-shadow:0 0 32px rgba(167,139,250,.35),0 0 12px rgba(232,201,138,.15);
}
.ob svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.6;}
.ob span{font-family:'Cormorant Garamond',serif;font-size:7px;letter-spacing:1.2px;color:rgba(167,139,250,.7);font-style:italic;}

.name-block{text-align:center;z-index:2;margin-top:14px;}
.name-block h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,6vw,52px);font-weight:700;font-style:italic;
  letter-spacing:4px;
  background:linear-gradient(135deg,var(--ivory) 0%,var(--warm) 40%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;
}
.name-block .role{font-size:clamp(9px,2.2vw,12px);letter-spacing:5px;color:rgba(167,139,250,.55);margin-top:7px;text-transform:uppercase;font-weight:300;}
.name-block .qpill{
  display:inline-block;margin-top:12px;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(10px,2.4vw,13px);color:rgba(245,240,232,.55);
  letter-spacing:.7px;line-height:1.7;max-width:360px;
  padding:9px 20px;
  border:1px solid rgba(167,139,250,.2);
  border-radius:50px;
  background:rgba(167,139,250,.07);
  backdrop-filter:blur(12px);
}

.scr{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;animation:fo 3s infinite;}
.scr span{font-size:8.5px;letter-spacing:4px;color:rgba(167,139,250,.55);}
.scr-line{width:.5px;height:34px;background:linear-gradient(var(--purple),transparent);animation:drip 3s infinite;}
@keyframes fo{0%,100%{opacity:.2;}50%{opacity:.7;}}
@keyframes drip{0%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}51%{transform:scaleY(1);transform-origin:bottom;}100%{transform:scaleY(0);transform-origin:bottom;}}

.ticker{position:relative;z-index:4;padding:10px 0;overflow:hidden;
  background:rgba(13,10,26,.9);
  border-top:1px solid rgba(167,139,250,.18);
  border-bottom:1px solid rgba(167,139,250,.18);
  backdrop-filter:blur(10px);
}
.ticker-t{display:inline-block;white-space:nowrap;animation:tick 36s linear infinite;}
.ticker-t span{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:3px;font-style:italic;color:rgba(167,139,250,.5);padding:0 5px;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.stats{position:relative;z-index:4;display:flex;justify-content:center;gap:clamp(14px,5vw,70px);padding:26px 20px;
  background:rgba(13,10,26,.88);
  border-bottom:1px solid rgba(167,139,250,.14);
  backdrop-filter:blur(10px);
}
.stat{text-align:center;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,7.5vw,54px);font-weight:700;background:linear-gradient(135deg,var(--warm),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-l{font-size:8.5px;letter-spacing:2.5px;color:rgba(245,240,232,.3);text-transform:uppercase;margin-top:3px;}

.footer{position:relative;z-index:4;text-align:center;padding:44px 20px;
  background:rgba(13,10,26,.88);
  border-top:1px solid rgba(167,139,250,.14);
  backdrop-filter:blur(10px);
}
.footer blockquote{font-family:'Cormorant Garamond',serif;font-size:clamp(13.5px,3.8vw,21px);font-weight:600;font-style:italic;color:var(--warm);max-width:560px;margin:0 auto 10px;line-height:1.65;}
.footer cite{font-size:9.5px;letter-spacing:3px;color:rgba(245,240,232,.22);font-style:normal;}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(8,5,20,.9);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(14px);}
.mo.active{display:flex;}
.md{
  background:linear-gradient(145deg,rgba(17,14,34,.99),rgba(22,18,44,.99));
  border:1px solid rgba(167,139,250,.22);border-radius:18px;
  padding:32px 26px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;
  position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,.75),0 0 70px rgba(167,139,250,.07);
  animation:mIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mIn{from{transform:scale(.82) translateY(22px);opacity:0;}to{transform:none;opacity:1;}}
.mc{position:absolute;top:15px;right:17px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);color:rgba(167,139,250,.7);width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:none;transition:all .2s;}
.mc:hover{background:rgba(167,139,250,.2);color:var(--warm);}
.md h2{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;font-style:italic;color:var(--warm);margin-bottom:18px;letter-spacing:2px;}
.md p,.md li{font-size:13.5px;line-height:1.88;color:rgba(245,240,232,.72);margin-bottom:8px;}
.md ul{padding-left:0;list-style:none;}
.md ul li{padding-left:16px;position:relative;margin-bottom:7px;}
.md ul li::before{content:'—';position:absolute;left:0;color:rgba(167,139,250,.5);}
.sl{font-size:9px;letter-spacing:3px;color:rgba(167,139,250,.65);text-transform:uppercase;font-weight:600;margin:18px 0 9px;padding-bottom:6px;border-bottom:1px solid rgba(167,139,250,.14);}
.bdg{display:inline-block;background:rgba(167,139,250,.09);border:1px solid rgba(167,139,250,.25);border-radius:20px;padding:4px 13px;font-size:11.5px;color:rgba(232,201,138,.88);margin:3px;}
.ec{display:flex;gap:14px;align-items:flex-start;margin-bottom:15px;padding:15px;background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.12);border-radius:12px;position:relative;overflow:hidden;}
.ec::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(var(--warm),var(--purple));}
.ec .ico{font-size:21px;flex-shrink:0;}
.ec strong{color:var(--ivory);font-size:13.5px;display:block;margin-bottom:2px;}
.ec small{color:rgba(167,139,250,.55);font-size:10.5px;display:block;margin-bottom:6px;}
.ec p{margin:0;font-size:12.5px;color:rgba(245,240,232,.52);}
.pc{border:1px solid rgba(167,139,250,.13);border-radius:11px;padding:14px;margin-bottom:9px;background:rgba(167,139,250,.05);transition:border-color .25s,background .25s;position:relative;overflow:hidden;}
.pc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.35),transparent);}
.pc:hover{border-color:rgba(167,139,250,.32);background:rgba(167,139,250,.09);}
.pc h3{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--warm);margin-bottom:5px;letter-spacing:.7px;}
.pc p{font-size:12.5px;color:rgba(245,240,232,.52);margin:0;}
.cr{display:flex;align-items:center;gap:16px;padding:15px 17px;margin-bottom:10px;background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.13);border-radius:12px;text-decoration:none;transition:all .25s;}
.cr:hover{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.38);transform:translateX(5px);}
.ci{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.ci.wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);}
.ci.em{background:rgba(232,201,138,.08);border:1px solid rgba(232,201,138,.2);}
.ci-info strong{display:block;font-size:13.5px;color:var(--ivory);margin-bottom:2px;}
.ci-info span{font-size:12px;color:rgba(245,240,232,.42);}

/* ── GALLERY GRID ── */
.gg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:6px;}
.gs{
  border-radius:12px;border:1px solid rgba(167,139,250,.2);
  background:rgba(167,139,250,.05);
  overflow:hidden;position:relative;cursor:pointer;
  transition:all .25s;aspect-ratio:4/3;
}
.gs:hover{border-color:rgba(167,139,250,.55);transform:scale(1.02);box-shadow:0 8px 30px rgba(167,139,250,.2);}
.gs img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.gs:hover img{transform:scale(1.06);}
.gs .gs-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 10px;
  background:linear-gradient(transparent,rgba(13,10,26,.88));
  font-size:10px;letter-spacing:1.5px;color:rgba(245,240,232,.75);
  text-transform:uppercase;font-weight:500;
}

/* ── LIGHTBOX ── */
#lightbox{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(5,3,15,.95);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
  padding:20px;
}
#lightbox.active{display:flex;}
#lightbox img{
  max-width:90vw;max-height:85vh;
  object-fit:contain;border-radius:12px;
  border:1px solid rgba(167,139,250,.25);
  box-shadow:0 20px 80px rgba(0,0,0,.8);
  animation:mIn .3s ease;
}
#lb-close{
  position:fixed;top:18px;right:20px;
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);
  color:rgba(167,139,250,.8);width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:none;transition:all .2s;z-index:301;
}
#lb-close:hover{background:rgba(167,139,250,.25);color:var(--warm);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,.28);border-radius:2px;}
</style>
</head>
<body>

<div id="c-dot"></div>
<div id="c-ring"></div>

<div id="bg-base"></div>
<div id="dot-tex"></div>
<div id="hatch"></div>
<canvas id="nebula"></canvas>
<canvas id="streak"></canvas>
<canvas id="dust"></canvas>

<!-- CORNERS -->
<svg class="corner corner-tl" viewBox="0 0 190 190" fill="none">
  <path d="M2 2 L95 2" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>

  <path d="M2 2 L46 2 L46 15 L15 15 L15 46 L2 46 Z" stroke="rgba(232,201,138,.4)" stroke-width=".8" fill="rgba(167,139,250,.05)"/>

  <circle cx="95" cy="2" r="2" fill="rgba(167,139,250,.45)"/>
  <circle cx="2" cy="95" r="2" fill="rgba(167,139,250,.45)"/>
  <circle cx="46" cy="2" r="1.5" fill="rgba(232,201,138,.55)"/>
  <circle cx="2" cy="46" r="1.5" fill="rgba(232,201,138,.55)"/>
  <rect x="64" y="-2" width="9" height="9" rx="2" stroke="rgba(201,132,122,.55)" stroke-width=".8" fill="none"/>
  <rect x="-2" y="64" width="9" height="9" rx="2" stroke="rgba(122,158,138,.55)" stroke-width=".8" fill="none"/>
  <path d="M24 2 L24 24 L2 24" stroke="rgba(167,139,250,.22)" stroke-width=".6" fill="none"/>
</svg>
<svg class="corner corner-tr" viewBox="0 0 190 190" fill="none">
  <path d="M2 2 L95 2" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>
  <path d="M2 2 L2 95" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>
  <path d="M2 2 L46 2 L46 15 L15 15 L15 46 L2 46 Z" stroke="rgba(232,201,138,.4)" stroke-width=".8" fill="rgba(167,139,250,.05)"/>
  <circle cx="2" cy="2" r="3.5" fill="rgba(167,139,250,1)"/>
  <circle cx="95" cy="2" r="2" fill="rgba(167,139,250,.45)"/>
  <circle cx="2" cy="95" r="2" fill="rgba(167,139,250,.45)"/>
  <circle cx="46" cy="2" r="1.5" fill="rgba(232,201,138,.55)"/>
</svg>
<svg class="corner corner-bl" viewBox="0 0 190 190" fill="none">
  <path d="M2 2 L95 2" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>
  <path d="M2 2 L2 95" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>
  <path d="M2 2 L46 2 L46 15 L15 15 L15 46 L2 46 Z" stroke="rgba(232,201,138,.4)" stroke-width=".8" fill="rgba(167,139,250,.05)"/>
  <circle cx="2" cy="2" r="3.5" fill="rgba(167,139,250,1)"/>
  <circle cx="95" cy="2" r="2" fill="rgba(167,139,250,.45)"/>
  <circle cx="2" cy="95" r="2" fill="rgba(167,139,250,.45)"/>
</svg>
<svg class="corner corner-br" viewBox="0 0 190 190" fill="none">
  <path d="M2 2 L95 2" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>
  <path d="M2 2 L2 95" stroke="rgba(167,139,250,.8)" stroke-width="1.3"/>
  <path d="M2 2 L46 2 L46 15 L15 15 L15 46 L2 46 Z" stroke="rgba(232,201,138,.4)" stroke-width=".8" fill="rgba(167,139,250,.05)"/>
  <circle cx="2" cy="2" r="3.5" fill="rgba(167,139,250,1)"/>
</svg>

<!-- FLOATING GEO -->
<div class="geo" style="left:4%;animation-duration:24s;animation-delay:0s;"><svg width="70" height="70" viewBox="0 0 70 70" fill="none"><polygon points="35,4 66,54 4,54" stroke="rgba(167,139,250,.42)" stroke-width="1.3"/></svg></div>
<div class="geo" style="left:15%;animation-duration:31s;animation-delay:4s;"><svg width="50" height="50" viewBox="0 0 50 50" fill="none"><rect x="3" y="3" width="44" height="44" rx="5" stroke="rgba(201,132,122,.38)" stroke-width="1.2" transform="rotate(15,25,25)"/></svg></div>
<div class="geo" style="left:27%;animation-duration:19s;animation-delay:9s;"><svg width="42" height="42" viewBox="0 0 42 42" fill="none"><circle cx="21" cy="21" r="17" stroke="rgba(122,158,138,.38)" stroke-width="1"/><circle cx="21" cy="21" r="9" stroke="rgba(122,158,138,.2)" stroke-width=".7"/></svg></div>
